<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortex · Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0d0f;--surface:#141619;--surface-2:#1a1d21;--surface-3:#22262b;--border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.14);--text:#e9eaec;--dim:#9aa1a8;--faint:#646a71;--accent:#cdf24a;--accent-ink:#1a2406}
  *{box-sizing:border-box;margin:0;padding:0}
  body{height:100vh;display:grid;place-items:center;font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);background-image:radial-gradient(800px 460px at 70% -10%,rgba(205,242,74,.06),transparent 60%)}
  .card{width:min(380px,92vw);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .logo{height:34px;margin-bottom:22px}
  h1{font-family:'Bricolage Grotesque',serif;font-size:21px;font-weight:600;margin-bottom:4px}
  p.sub{font-size:13px;color:var(--dim);margin-bottom:22px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:0 0 6px}
  input{width:100%;height:42px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;padding:0 13px;outline:none;margin-bottom:16px;transition:.15s}
  input:focus{border-color:var(--border-2);background:var(--surface-3)}
  button{width:100%;height:44px;border:0;border-radius:10px;background:var(--accent);color:var(--accent-ink);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)} button:active{transform:scale(.99)}
  .err{font-size:12.5px;color:#f87171;margin-bottom:14px;min-height:16px}
</style>
</head>
<body>
  <form class="card" id="form">
    <img src="/logo.png" alt="Lar Plásticos" class="logo">
    <h1>Entrar no Cortex</h1>
    <p class="sub">Painel de vendas · acesse com seu e-mail</p>
    <div class="err" id="err"></div>
    <label>E-mail</label>
    <input type="email" id="email" autocomplete="username" required autofocus>
    <label>Senha</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit" id="btn">Entrar</button>
  </form>
<script>
  const f=document.getElementById("form");
  f.onsubmit=async(e)=>{
    e.preventDefault();
    const btn=document.getElementById("btn"); btn.disabled=true; btn.textContent="Entrando…";
    document.getElementById("err").textContent="";
    try{
      const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:email.value.trim(),password:password.value})});
      if(r.ok){ location.href="/"; return; }
      const e2=await r.json().catch(()=>({})); document.getElementById("err").textContent=e2.detail||"E-mail ou senha inválidos";
    }catch(_){ document.getElementById("err").textContent="Erro de rede"; }
    btn.disabled=false; btn.textContent="Entrar";
  };
</script>
</body>
</html>
