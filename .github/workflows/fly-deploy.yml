name: Deploy no Fly

# Todo push no main faz deploy automático no Fly.io.
# Pré-requisito (uma vez): adicionar o secret FLY_API_TOKEN no repositório
#   Settings → Secrets and variables → Actions → New repository secret
#   Gere o token com:  fly tokens create deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
