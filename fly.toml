# troque "app" pelo nome que você criou no Fly (só minúsculas/números/hífen)
app = "cortex-vendas-lar"
primary_region = "gru"   # São Paulo — IP brasileiro (exigido pelo Neppo)

[build]

[env]
  CORTEX_DATA_DIR = "/data"   # banco + caches no volume persistente
  SECURE_COOKIES = "1"        # cookies de sessão só por HTTPS

# disco persistente p/ o SQLite (cortex.db) — criar antes com:
#   fly volumes create cortex_data --region gru --size 3
[[mounts]]
  source = "cortex_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # webhook do Neppo precisa do app sempre no ar
  auto_start_machines = true
  min_machines_running = 1     # UMA instância só (SQLite não é compartilhável)

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
